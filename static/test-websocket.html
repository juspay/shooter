<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOOTER WebSocket Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #000;
            color: #fff;
        }
        .container {
            background: #111;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: bold;
        }
        .connected { background: #059669; }
        .disconnected { background: #dc2626; }
        .connecting { background: #d97706; }
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin: 5px;
            cursor: pointer;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        #messages {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
        }
        .message {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #0066cc;
            padding-left: 10px;
        }
        .error { border-left-color: #dc2626; }
        .success { border-left-color: #059669; }
        input[type="text"] {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>🎯 SHOOTER WebSocket Test</h1>
    
    <div class="container">
        <h2>Connection Status</h2>
        <div id="status" class="status disconnected">Disconnected</div>
        
        <button id="connect" onclick="connect()">Connect</button>
        <button id="disconnect" onclick="disconnect()" disabled>Disconnect</button>
        
        <h3>Test Messages</h3>
        <button onclick="sendPing()" id="pingBtn" disabled>Send Ping</button>
        <button onclick="requestAnalytics()" id="analyticsBtn" disabled>Request Analytics</button>
        
        <h3>Custom Message</h3>
        <input type="text" id="customMessage" placeholder="Enter JSON message" value='{"type":"ping","payload":{}}'/>
        <button onclick="sendCustom()" id="customBtn" disabled>Send Custom</button>
    </div>
    
    <div class="container">
        <h2>Messages</h2>
        <button onclick="clearMessages()">Clear</button>
        <div id="messages"></div>
    </div>

    <script>
        let ws = null;
        let messageCount = 0;

        function updateStatus(status, className) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = status;
            statusEl.className = `status ${className}`;
        }

        function updateButtons(connected) {
            document.getElementById('connect').disabled = connected;
            document.getElementById('disconnect').disabled = !connected;
            document.getElementById('pingBtn').disabled = !connected;
            document.getElementById('analyticsBtn').disabled = !connected;
            document.getElementById('customBtn').disabled = !connected;
        }

        function addMessage(text, type = 'info') {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${text}`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            messageCount++;
        }

        function connect() {
            updateStatus('Connecting...', 'connecting');
            addMessage('Attempting to connect to ws://localhost:7777/ws');
            
            ws = new WebSocket('ws://localhost:7777/ws');
            
            ws.onopen = function(event) {
                updateStatus('Connected', 'connected');
                updateButtons(true);
                addMessage('✅ WebSocket connection established', 'success');
            };
            
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    addMessage(`📨 Received: ${JSON.stringify(data, null, 2)}`, 'success');
                } catch (e) {
                    addMessage(`📨 Received (raw): ${event.data}`, 'success');
                }
            };
            
            ws.onclose = function(event) {
                updateStatus('Disconnected', 'disconnected');
                updateButtons(false);
                addMessage(`❌ Connection closed (code: ${event.code})`, 'error');
            };
            
            ws.onerror = function(error) {
                addMessage(`💥 WebSocket error: ${error}`, 'error');
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function sendPing() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'ping',
                    payload: {},
                    timestamp: Date.now(),
                    id: `test_${Date.now()}`
                };
                ws.send(JSON.stringify(message));
                addMessage(`📤 Sent ping: ${JSON.stringify(message)}`);
            }
        }

        function requestAnalytics() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'analytics_request',
                    payload: {
                        type: 'dashboard_metrics',
                        params: {}
                    },
                    timestamp: Date.now(),
                    id: `analytics_${Date.now()}`
                };
                ws.send(JSON.stringify(message));
                addMessage(`📤 Sent analytics request: ${JSON.stringify(message)}`);
            }
        }

        function sendCustom() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                try {
                    const customText = document.getElementById('customMessage').value;
                    const message = JSON.parse(customText);
                    ws.send(JSON.stringify(message));
                    addMessage(`📤 Sent custom: ${JSON.stringify(message)}`);
                } catch (e) {
                    addMessage(`❌ Invalid JSON: ${e.message}`, 'error');
                }
            }
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
            messageCount = 0;
        }

        // Auto-connect on page load
        window.onload = function() {
            addMessage('🎯 SHOOTER WebSocket Test Ready');
            addMessage('Click "Connect" to start testing WebSocket functionality');
        };
    </script>
</body>
</html>
