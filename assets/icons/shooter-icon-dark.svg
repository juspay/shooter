<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for crosshair glow -->
    <radialGradient id="crosshairGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00aaff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:0.4" />
    </radialGradient>
    
    <!-- Gradient for center dot -->
    <radialGradient id="centerDot" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </radialGradient>
    
    <!-- Shadow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background with subtle gradient -->
  <rect width="400" height="400" fill="#0a0a0a" rx="20"/>
  
  <!-- Subtle background grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grid)" rx="20"/>
  
  <!-- Outer targeting rings -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#00aaff" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="#00aaff" stroke-width="1" opacity="0.4"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#00aaff" stroke-width="2" opacity="0.5"/>
  
  <!-- Main crosshair - horizontal -->
  <rect x="40" y="188" width="320" height="24" fill="url(#crosshairGlow)" filter="url(#glow)" rx="12"/>
  <rect x="50" y="192" width="300" height="16" fill="#00ffff" rx="8"/>
  
  <!-- Main crosshair - vertical -->
  <rect x="188" y="40" width="24" height="320" fill="url(#crosshairGlow)" filter="url(#glow)" rx="12"/>
  <rect x="192" y="50" width="16" height="300" fill="#00ffff" rx="8"/>
  
  <!-- Inner targeting circle -->
  <circle cx="200" cy="200" r="80" fill="none" stroke="#00ffff" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Precision markers at cardinal points -->
  <g fill="#ffffff" opacity="0.9">
    <rect x="196" y="25" width="8" height="15" rx="4"/>
    <rect x="196" y="360" width="8" height="15" rx="4"/>
    <rect x="25" y="196" width="15" height="8" rx="4"/>
    <rect x="360" y="196" width="15" height="8" rx="4"/>
  </g>
  
  <!-- Corner range indicators -->
  <g stroke="#00aaff" stroke-width="2" opacity="0.6">
    <path d="M 60 60 L 80 60 L 80 80"/>
    <path d="M 340 60 L 320 60 L 320 80"/>
    <path d="M 340 340 L 320 340 L 320 320"/>
    <path d="M 60 340 L 80 340 L 80 320"/>
  </g>
  
  <!-- Secondary crosshair lines (thinner) -->
  <g stroke="#00aaff" stroke-width="1" opacity="0.5">
    <line x1="120" y1="200" x2="130" y2="200"/>
    <line x1="270" y1="200" x2="280" y2="200"/>
    <line x1="200" y1="120" x2="200" y2="130"/>
    <line x1="200" y1="270" x2="200" y2="280"/>
  </g>
  
  <!-- Center targeting dot -->
  <circle cx="200" cy="200" r="24" fill="url(#centerDot)" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="16" fill="#ffffff"/>
  <circle cx="200" cy="200" r="8" fill="#00ffff"/>
  
  <!-- Scanning beam animation placeholder (static in SVG) -->
  <g stroke="#00ffff" stroke-width="1" opacity="0.7">
    <line x1="200" y1="200" x2="280" y2="120"/>
    <line x1="200" y1="200" x2="120" y2="280"/>
  </g>
</svg>