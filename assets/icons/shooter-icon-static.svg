<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#00aaff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#1a1a2e" rx="80"/>
  
  <!-- Central observer core (larger) -->
  <circle cx="200" cy="200" r="40" fill="url(#coreGrad)"/>
  
  <!-- Inner monitoring ring (thicker, larger) -->
  <circle cx="200" cy="200" r="80" fill="none" stroke="#00aaff" stroke-width="4"/>
  
  <!-- Outer detection field (larger, more visible) -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#00aaff" stroke-width="2"/>
  
  <!-- Scanning beams (static, thicker) -->
  <g stroke="#00ffff" stroke-width="3">
    <line x1="200" y1="200" x2="270" y2="130"/>
    <line x1="200" y1="200" x2="130" y2="270"/>
  </g>
  
  <!-- Diagonal detection points (larger) -->
  <g fill="#00aaff">
    <circle cx="294" cy="106" r="6"/>
    <circle cx="294" cy="294" r="6"/>
    <circle cx="106" cy="294" r="6"/>
    <circle cx="106" cy="106" r="6"/>
  </g>
  
  <!-- Central pulse (static, larger) -->
  <circle cx="200" cy="200" r="20" fill="none" stroke="#ffffff" stroke-width="3"/>
  
  <!-- Data flow lines (diagonal only) -->
  <g stroke="#00aaff" stroke-width="2">
    <line x1="60" y1="60" x2="200" y2="200"/>
    <line x1="340" y1="60" x2="200" y2="200"/>
    <line x1="340" y1="340" x2="200" y2="200"/>
    <line x1="60" y1="340" x2="200" y2="200"/>
  </g>
</svg>