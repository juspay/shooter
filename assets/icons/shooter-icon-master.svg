<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple Crosshair Design -->
  <rect width="400" height="400" fill="#1a1a1a"/>
  
  <!-- Horizontal line -->
  <rect x="50" y="190" width="300" height="20" fill="#00ffff"/>
  
  <!-- Vertical line -->
  <rect x="190" y="50" width="20" height="300" fill="#00ffff"/>
  
  <!-- Center circle -->
  <circle cx="200" cy="200" r="60" fill="none" stroke="#00ffff" stroke-width="16"/>
  
  <!-- Inner center dot -->
  <circle cx="200" cy="200" r="16" fill="#ffffff"/>
</svg>