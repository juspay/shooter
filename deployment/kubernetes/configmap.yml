# ConfigMap for SHOOTER application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: shooter-config
  namespace: shooter
  labels:
    app: shooter
    component: config
data:
  NODE_ENV: 'production'
  PORT: '3000'
  REDIS_URL: 'redis://redis-service:6379'
  DATABASE_URL: 'postgresql://shooter:$(DB_PASSWORD)@postgres-service:5432/shooter'

  # Logging configuration
  LOG_LEVEL: 'info'
  LOG_FORMAT: 'json'

  # Performance monitoring
  ENABLE_METRICS: 'true'
  METRICS_RETENTION: '7d'
  SLOW_OPERATION_THRESHOLD: '100'

  # Health check configuration
  HEALTH_CHECK_INTERVAL: '30000'
  HEALTH_CHECK_TIMEOUT: '5000'

  # Storage configuration
  STORAGE_MAX_RETRIES: '3'
  STORAGE_RETRY_DELAY: '2000'
  MEMORY_CACHE_SIZE: '1000'

  # Scheduler configuration
  REDIS_PUSH_DELAY: '5000'
  DATABASE_PUSH_DELAY: '10000'

---
# ConfigMap for monitoring configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: shooter-monitoring-config
  namespace: shooter
  labels:
    app: shooter
    component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    scrape_configs:
      - job_name: 'shooter-app'
        static_configs:
          - targets: ['shooter-service:3000']
        metrics_path: '/api/metrics'
        scrape_interval: 30s
        
      - job_name: 'redis'
        static_configs:
          - targets: ['redis-service:6379']
        
      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-service:5432']

  alerts.yml: |
    groups:
      - name: shooter.rules
        rules:
          - alert: HighErrorRate
            expr: rate(shooter_operations_total{success="false"}[5m]) > 0.1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High error rate detected"
              description: "Error rate is {{ $value }} errors per second"
              
          - alert: HighLatency
            expr: histogram_quantile(0.95, rate(shooter_operation_duration_seconds_bucket[5m])) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High latency detected"
              description: "95th percentile latency is {{ $value }} seconds"
              
          - alert: StorageDown
            expr: shooter_storage_connected == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Storage backend is down"
              description: "Storage {{ $labels.storage }} is not connected"
              
          - alert: MemoryUsageHigh
            expr: process_resident_memory_bytes / 1024 / 1024 > 512
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage"
              description: "Memory usage is {{ $value }}MB"
