# Kubernetes deployment for SHOOTER application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shooter-app
  namespace: shooter
  labels:
    app: shooter
    component: app
    version: '1.0.0'
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: shooter
      component: app
  template:
    metadata:
      labels:
        app: shooter
        component: app
        version: '1.0.0'
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3000'
        prometheus.io/path: '/api/metrics'
    spec:
      serviceAccountName: shooter-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: shooter-app
          image: shooter:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            # Configuration from ConfigMap
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: shooter-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: shooter-config
                  key: PORT
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: shooter-config
                  key: REDIS_URL

            # Secrets
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shooter-secrets
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: 'postgresql://shooter:$(DB_PASSWORD)@postgres-service:5432/shooter'
            - name: BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: shooter-secrets
                  key: BEARER_TOKEN
            - name: APNS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: shooter-secrets
                  key: APNS_KEY_ID
            - name: APNS_TEAM_ID
              valueFrom:
                secretKeyRef:
                  name: shooter-secrets
                  key: APNS_TEAM_ID
            - name: APNS_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: shooter-secrets
                  key: APNS_AUTH_KEY
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shooter-secrets
                  key: CLAUDE_API_KEY

          # Resource limits and requests
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Health checks
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Startup probe for slow starting applications
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Volume mounts for logs
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs

      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}

      # DNS configuration
      dnsPolicy: ClusterFirst

      # Restart policy
      restartPolicy: Always

      # Termination grace period
      terminationGracePeriodSeconds: 30

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shooter-app-hpa
  namespace: shooter
  labels:
    app: shooter
    component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shooter-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: shooter-app-pdb
  namespace: shooter
  labels:
    app: shooter
    component: pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: shooter
      component: app
