# Kubernetes secrets for SHOOTER application
# Note: In production, use proper secret management (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: shooter-secrets
  namespace: shooter
  labels:
    app: shooter
    component: secrets
type: Opaque
stringData:
  # Database credentials
  DB_PASSWORD: 'change-this-in-production'

  # API authentication
  BEARER_TOKEN: 'your-secure-bearer-token-here'

  # APNs configuration
  APNS_KEY_ID: 'your-apns-key-id'
  APNS_TEAM_ID: 'your-apns-team-id'
  APNS_AUTH_KEY: |
    -----BEGIN PRIVATE KEY-----
    your-apns-private-key-here
    -----END PRIVATE KEY-----

  # Claude API
  CLAUDE_API_KEY: 'your-claude-api-key'

  # Monitoring credentials
  GRAFANA_ADMIN_PASSWORD: 'admin-password-here'
  PROMETHEUS_PASSWORD: 'prometheus-password-here'

---
# Service account for the application
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shooter-service-account
  namespace: shooter
  labels:
    app: shooter
automountServiceAccountToken: true

---
# Role with minimal required permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shooter-role
  namespace: shooter
rules:
  - apiGroups: ['']
    resources: ['pods', 'services', 'endpoints']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['apps']
    resources: ['deployments', 'replicasets']
    verbs: ['get', 'list', 'watch']

---
# Bind the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shooter-role-binding
  namespace: shooter
subjects:
  - kind: ServiceAccount
    name: shooter-service-account
    namespace: shooter
roleRef:
  kind: Role
  name: shooter-role
  apiGroup: rbac.authorization.k8s.io
