<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Tinted/Grayscale Design -->
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="#262626"/>
  
  <!-- Outer scope ring -->
  <circle cx="512" cy="512" r="480" fill="none" stroke="#666666" stroke-width="8"/>
  
  <!-- Middle scope ring -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="#666666" stroke-width="6"/>
  
  <!-- Inner scope ring -->
  <circle cx="512" cy="512" r="240" fill="none" stroke="#666666" stroke-width="4"/>
  
  <!-- Center scope area -->
  <circle cx="512" cy="512" r="120" fill="#404040" stroke="#808080" stroke-width="2"/>
  
  <!-- Corner range finders -->
  <g stroke="#e6e6e6" stroke-width="6" fill="none">
    <path d="M 80 80 L 80 160 M 80 80 L 160 80"/>
    <path d="M 864 80 L 944 80 M 944 80 L 944 160"/>
    <path d="M 944 864 L 944 944 M 944 944 L 864 944"/>
    <path d="M 160 944 L 80 944 M 80 944 L 80 864"/>
  </g>
  
  <!-- Main crosshair - horizontal -->
  <rect x="120" y="506" width="784" height="12" fill="#f0f0f0"/>
  
  <!-- Main crosshair - vertical -->
  <rect x="506" y="120" width="12" height="784" fill="#f0f0f0"/>
  
  <!-- Center crosshair - horizontal detail -->
  <rect x="432" y="508" width="160" height="8" fill="#ffffff"/>
  
  <!-- Center crosshair - vertical detail -->
  <rect x="508" y="432" width="8" height="160" fill="#ffffff"/>
  
  <!-- Mil-dot markers on crosshair -->
  <g fill="#cccccc">
    <!-- Horizontal dots -->
    <circle cx="350" cy="512" r="4"/>
    <circle cx="400" cy="512" r="4"/>
    <circle cx="624" cy="512" r="4"/>
    <circle cx="674" cy="512" r="4"/>
    
    <!-- Vertical dots -->
    <circle cx="512" cy="350" r="4"/>
    <circle cx="512" cy="400" r="4"/>
    <circle cx="512" cy="624" r="4"/>
    <circle cx="512" cy="674" r="4"/>
  </g>
  
  <!-- Center targeting dot -->
  <circle cx="512" cy="512" r="16" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  
  <!-- Inner targeting circle -->
  <circle cx="512" cy="512" r="8" fill="#000000"/>
</svg>